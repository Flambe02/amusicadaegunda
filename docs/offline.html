<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sem conexăo - A Música da Segunda</title>
  <meta name="theme-color" content="#050505" />
  <style>
    :root {
      --bg: #050505;
      --card: rgba(255, 255, 255, 0.06);
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, 0.68);
      --brand: #32a2dc;
      --yellow: #ffd400;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(circle at top, rgba(253, 212, 0, 0.18), transparent 32%),
        linear-gradient(180deg, #101010 0%, var(--bg) 100%);
      color: var(--text);
      padding: 24px;
    }
    main {
      width: 100%;
      max-width: 420px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      background: rgba(17, 17, 17, 0.8);
      backdrop-filter: blur(16px);
      padding: 28px 22px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }
    .icon {
      width: 92px;
      height: 92px;
      margin: 0 auto 18px;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 14px 30px rgba(0,0,0,0.28));
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 900;
      margin-bottom: 10px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    #last-song {
      display: none;
      background: var(--card);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 22px;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.08);
    }
    #last-song.visible { display: flex; align-items: center; gap: 14px; }
    .last-song-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--yellow);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      display: block;
      text-align: left;
    }
    .thumb {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      object-fit: cover;
      background: #334155;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .song-info { flex: 1; min-width: 0; }
    .song-title {
      font-weight: 800;
      font-size: 0.98rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-artist {
      color: var(--muted);
      font-size: 0.83rem;
      margin-top: 3px;
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      background: var(--brand);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 12px 24px;
      border-radius: 999px;
      transition: opacity 0.2s;
      border: 0;
      cursor: pointer;
    }
    .btn.secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn:active { opacity: 0.82; }
    .status {
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <main>
    <img class="icon" src="/images/Caipivara_transp-removebg-preview.png" alt="A Música da Segunda" />
    <h1>Vocę está offline</h1>
    <p class="subtitle">Sem internet no momento. O app continua disponível com o shell local e volta a sincronizar assim que a conexăo retornar.</p>

    <span class="last-song-label" id="last-label" style="display:none">Última música vista</span>
    <div id="last-song">
      <div class="thumb" id="thumb">??</div>
      <div class="song-info">
        <div class="song-title" id="song-title"></div>
        <div class="song-artist" id="song-artist"></div>
      </div>
    </div>

    <div class="actions">
      <button class="btn" id="retry-btn" type="button">Tentar novamente</button>
      <a class="btn secondary" href="/">Ir para o início</a>
    </div>

    <p class="status">
      <span class="dot"></span>
      Modo offline
    </p>
  </main>

  <script>
    const DB_NAME = 'musica-da-segunda-offline';
    const STORE_NAME = 'app-state';
    const LAST_SONG_KEY = 'last-song';

    function readLastSongFromIndexedDB() {
      if (!('indexedDB' in window)) return Promise.resolve(null);

      return new Promise((resolve) => {
        const request = indexedDB.open(DB_NAME, 1);

        request.onupgradeneeded = function () {
          const db = request.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };

        request.onerror = function () {
          resolve(null);
        };

        request.onsuccess = function () {
          const db = request.result;
          const tx = db.transaction(STORE_NAME, 'readonly');
          const getRequest = tx.objectStore(STORE_NAME).get(LAST_SONG_KEY);

          getRequest.onsuccess = function () {
            resolve(getRequest.result || null);
            db.close();
          };

          getRequest.onerror = function () {
            resolve(null);
            db.close();
          };
        };
      });
    }

    function renderLastSong(song) {
      if (!song || !song.title) return;

      document.getElementById('last-label').style.display = 'block';
      document.getElementById('last-song').classList.add('visible');
      document.getElementById('song-title').textContent = song.title;
      document.getElementById('song-artist').textContent = song.artist || '';

      if (song.thumbnail) {
        const img = document.createElement('img');
        img.src = song.thumbnail;
        img.alt = song.title;
        img.className = 'thumb';
        img.onerror = function () { this.style.display = 'none'; };
        document.getElementById('thumb').replaceWith(img);
      }
    }

    readLastSongFromIndexedDB().then((song) => {
      if (song) {
        renderLastSong(song);
        return;
      }

      try {
        const raw = localStorage.getItem('last-song-cache');
        if (raw) renderLastSong(JSON.parse(raw));
      } catch {}
    });

    document.getElementById('retry-btn').addEventListener('click', function () {
      window.location.href = '/';
    });

    window.addEventListener('online', function () {
      window.location.href = '/';
    });
  </script>
</body>
</html>
